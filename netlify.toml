[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/dashboards"
  to = "https://demodashboardfinance.netlify.app/"
  status = 200
  force = true

[[redirects]]
  from = "/dashboards/*"
  to = "https://demodashboardfinance.netlify.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
